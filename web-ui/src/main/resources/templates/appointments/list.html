<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointments</title>
<style>
body {
	font-family: Arial, sans-serif;
	margin: 40px;
}

form {
	margin-top: 12px;
}

label {
	display: block;
	margin-top: 10px;
}

input, button {
	margin-top: 4px;
}

button, .link-button, .action-link {
	margin-top: 12px;
}

.message {
	margin-top: 12px;
	color: green;
}

.error {
	color: red;
}

table {
	margin-top: 16px;
	border-collapse: collapse;
	width: 100%;
}

th, td {
	border: 1px solid #ddd;
	padding: 6px 10px;
	text-align: left;
}

.actions {
	white-space: nowrap;
}

.inline-form {
	display: inline;
}

.inline-form button {
	margin-top: 0;
}

.top-links a {
	margin-right: 12px;
}
</style>
</head>
<body>
	<h1>Appointments</h1>
	<p>View, search, add, update, and delete appointment records.</p>

	<div class="top-links">
		<a th:href="@{/}">Home</a>
		<a th:href="@{/appointments/new}">Add Appointment</a>
	</div>

	<div class="message" th:if="${successMessage}"
		th:text="${successMessage}"></div>
	<div class="message error" th:if="${errorMessage}"
		th:text="${errorMessage}"></div>

	<form th:action="@{/appointments}" method="get">
		<label for="keyword">Search Appointments</label> <input id="keyword"
			name="keyword" type="text" th:value="${keyword}"
			placeholder="Search by id, number, type, description, doctor id">
		<button type="submit">Search</button>
		<a th:href="@{/appointments}">Clear</a>
	</form>

	<h2>Appointment List</h2>
	<table>
		<thead>
			<tr>
				<th>Appointment ID</th>
				<th>Number</th>
				<th>Type</th>
				<th>Date</th>
				<th>Description</th>
				<th>Doctor</th>
				<th>Actions</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="appointment : ${appointments}">
				<td th:text="${appointment.appointmentId}"></td>
				<td th:text="${appointment.appointmentNumber}"></td>
				<td th:text="${appointment.appointmentType}"></td>
				<td th:text="${appointment.appointmentDate}"></td>
				<td th:text="${appointment.appointmentDescription}"></td>
				<td
					th:text="${appointment.appointmentDoctorId != null ? appointment.appointmentDoctorId : 'Not assigned'}"></td>
				<td class="actions"><a
					th:href="@{/appointments/{id}(id=${appointment.appointmentId})}">View</a>
					<a
					th:href="@{/appointments/{id}/edit(id=${appointment.appointmentId})}">Edit</a>
					<form class="inline-form"
						th:action="@{/appointments/{id}/delete(id=${appointment.appointmentId})}"
						method="post">
						<button type="submit">Delete</button>
					</form></td>
			</tr>
			<tr th:if="${#lists.isEmpty(appointments)}">
				<td colspan="7">No appointments found.</td>
			</tr>
		</tbody>
	</table>
</body>
</html>
