<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Details</title>
<style>
body {
	font-family: Arial, sans-serif;
	margin: 40px;
}

table {
	margin-top: 16px;
	border-collapse: collapse;
}

th, td {
	border: 1px solid #ddd;
	padding: 6px 10px;
	text-align: left;
}

.actions {
	margin-top: 16px;
}

.actions a, .actions form {
	display: inline-block;
	margin-right: 12px;
}

.actions form button {
	margin-top: 0;
}
</style>
</head>
<body>
	<h1>Doctor Details</h1>
	<p>Detailed doctor information.</p>

	<table>
		<tbody>
			<tr>
				<th>Doctor ID</th>
				<td th:text="${doctor.doctorsId}"></td>
			</tr>
			<tr>
				<th>Name</th>
				<td th:text="${doctor.doctorsName}"></td>
			</tr>
			<tr>
				<th>Mobile</th>
				<td th:text="${doctor.doctorsMobile}"></td>
			</tr>
			<tr>
				<th>Email</th>
				<td th:text="${doctor.doctorsEmail}"></td>
			</tr>
			<tr>
				<th>Password</th>
				<td th:text="${doctor.doctorsPassword}"></td>
			</tr>
			<tr>
				<th>Address</th>
				<td th:text="${doctor.doctorsAddress}"></td>
			</tr>
			<tr>
				<th>Username</th>
				<td th:text="${doctor.doctorsUsername}"></td>
			</tr>
		</tbody>
	</table>

	<div class="actions">
		<a th:href="@{/doctors/{id}/edit(id=${doctor.doctorsId})}">Edit</a>
		<form th:action="@{/doctors/{id}/delete(id=${doctor.doctorsId})}"
			method="post">
			<button type="submit">Delete</button>
		</form>
		<a th:href="@{/doctors}">Back to List</a>
	</div>
</body>
</html>
